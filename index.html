<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.5);
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
    }

    #restart:hover {
      background: #e94560;
      color: #fff;
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.4rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
    .score-box .value { font-size: 1.6rem; font-weight: bold; margin-top: 2px; }
    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a8dadc; }
    .score-box.draw .value { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-box x">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">Draws</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, score;

    function init() {
      score = { X: 0, O: 0, draw: 0 };
      newGame();
    }

    function newGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`Player ${current}'s turn`);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScoreDisplay() {
      document.getElementById('score-x').textContent = score.X;
      document.getElementById('score-o').textContent = score.O;
      document.getElementById('score-draw').textContent = score.draw;
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a,b,c];
        }
      }
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || cell.classList.contains('taken')) return;

      const i = +cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
        setStatus(`Player ${current} wins!`);
        score[current]++;
        updateScoreDisplay();
        gameOver = true;
      } else if (board.every(Boolean)) {
        setStatus("It's a draw!");
        score.draw++;
        updateScoreDisplay();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`Player ${current}'s turn`);
      }
    });

    document.getElementById('restart').addEventListener('click', newGame);

    init();
  </script>
</body>
</html>
